# ── Base de datos PostgreSQL ──────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/AdrithStore
spring.datasource.username=postgres
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Hibernate / JPA ───────────────────────────────────────────────────────
# update: agrega columnas nuevas automáticamente, NUNCA borra datos
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── NO usar sql.init — Hibernate gestiona el esquema con ddl-auto ─────────
# (comentado para evitar conflicto con ddl-auto=update)
# spring.sql.init.mode=never

# ── Servidor ──────────────────────────────────────────────────────────────
server.port=8080

# ── Multipart (upload de imágenes) ────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── DevTools ─────────────────────────────────────────────────────────────
spring.devtools.restart.enabled=true